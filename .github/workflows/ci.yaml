name: Publicando minha imagem automaticamente
# Definindo onde será o gatilho
on:
  push:
    branches: [main]
# Serviço base, VM com Ubuntu    
jobs:
  CI:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
    
      - name: Docker Login
        uses: docker/login-action@v2.1.0
        with:
          username: ${{ secrets.SEC_USER_DOCKER }}  
          password: ${{ secrets.SEC_PASSWD_DOCKER }}
          
      - name: Build and push Docker images
        uses: docker/build-push-action@v3.2.0
        with:
          context: .
          push: true
          tags: |
            colavite/applinda:v2.2
            colavite/applinda:latest
            
